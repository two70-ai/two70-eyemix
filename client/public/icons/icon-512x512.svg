<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Eye outline (ellipse) -->
  <ellipse cx="256" cy="256" rx="243" ry="140" stroke="url(#fg)" stroke-width="19" fill="none"/>
  <!-- Iris circle -->
  <circle cx="256" cy="256" r="89" stroke="url(#fg)" stroke-width="12" fill="url(#fg)" fill-opacity="0.2"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="32" fill="url(#fg)"/>
  <!-- EM text -->
  <text x="256" y="435" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#fg)">EM</text>
</svg>
