<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="25" fill="url(#bg)"/>
  <!-- Eye outline (ellipse) -->
  <ellipse cx="64" cy="64" rx="60" ry="35" stroke="url(#fg)" stroke-width="4" fill="none"/>
  <!-- Iris circle -->
  <circle cx="64" cy="64" r="22" stroke="url(#fg)" stroke-width="3" fill="url(#fg)" fill-opacity="0.2"/>
  <!-- Pupil -->
  <circle cx="64" cy="64" r="8" fill="url(#fg)"/>
  <!-- EM text -->
  <text x="64" y="108" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="url(#fg)">EM</text>
</svg>
