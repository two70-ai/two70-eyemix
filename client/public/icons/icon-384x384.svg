<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="384" height="384" rx="76" fill="url(#bg)"/>
  <!-- Eye outline (ellipse) -->
  <ellipse cx="192" cy="192" rx="182" ry="105" stroke="url(#fg)" stroke-width="14" fill="none"/>
  <!-- Iris circle -->
  <circle cx="192" cy="192" r="67" stroke="url(#fg)" stroke-width="9" fill="url(#fg)" fill-opacity="0.2"/>
  <!-- Pupil -->
  <circle cx="192" cy="192" r="24" fill="url(#fg)"/>
  <!-- EM text -->
  <text x="192" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="url(#fg)">EM</text>
</svg>
