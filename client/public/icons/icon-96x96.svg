<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="96" height="96" rx="19" fill="url(#bg)"/>
  <!-- Eye outline (ellipse) -->
  <ellipse cx="48" cy="48" rx="45" ry="26" stroke="url(#fg)" stroke-width="3" fill="none"/>
  <!-- Iris circle -->
  <circle cx="48" cy="48" r="16" stroke="url(#fg)" stroke-width="2" fill="url(#fg)" fill-opacity="0.2"/>
  <!-- Pupil -->
  <circle cx="48" cy="48" r="6" fill="url(#fg)"/>
  <!-- EM text -->
  <text x="48" y="81" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="url(#fg)">EM</text>
</svg>
