<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="144" height="144" rx="28" fill="url(#bg)"/>
  <!-- Eye outline (ellipse) -->
  <ellipse cx="72" cy="72" rx="68" ry="39" stroke="url(#fg)" stroke-width="5" fill="none"/>
  <!-- Iris circle -->
  <circle cx="72" cy="72" r="25" stroke="url(#fg)" stroke-width="3" fill="url(#fg)" fill-opacity="0.2"/>
  <!-- Pupil -->
  <circle cx="72" cy="72" r="9" fill="url(#fg)"/>
  <!-- EM text -->
  <text x="72" y="122" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="url(#fg)">EM</text>
</svg>
